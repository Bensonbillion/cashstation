<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <title>OG Image — MyCashStation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0A0A0A;
    }

    .og {
      width: 1200px;
      height: 630px;
      position: relative;
      display: flex;
      align-items: center;
      background:
        radial-gradient(ellipse 50% 60% at 15% 85%, rgba(255,215,0,0.20) 0%, transparent 70%),
        #0A0A0A;
      overflow: hidden;
    }

    /* Gold rule at 80% from top */
    .og::after {
      content: '';
      position: absolute;
      top: 80%;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(255,215,0,.4);
    }

    .og-left {
      flex: 1;
      padding: 80px 60px 80px 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 1;
    }

    .og-eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2em;
      color: #C4A265;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .og-headline {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      font-weight: 700;
      line-height: 1.1;
      color: #F0EDE6;
      margin-bottom: 24px;
    }

    .og-trust {
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      color: #888880;
      letter-spacing: 0.02em;
    }

    .og-url {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #FFD700;
      margin-top: 40px;
    }

    .og-right {
      width: 480px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .og-card {
      width: 320px;
      height: 360px;
      background: #FFFFFF;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 24px 80px rgba(0,0,0,0.6),
        0 8px 24px rgba(0,0,0,0.4),
        0 0 0 1px rgba(255,215,0,0.15);
    }

    .og-bills {
      position: relative;
      width: 220px;
      height: 120px;
    }

    .og-bill {
      position: absolute;
      width: 220px;
      height: 100px;
      border-radius: 8px;
      border: 2.5px solid #C4A265;
      background: linear-gradient(135deg, #F5F0E0, #E8E0C8);
    }

    .og-bill--back {
      transform: rotate(-6deg) translateY(10px) translateX(-6px);
      opacity: 0.5;
    }

    .og-bill--mid {
      transform: rotate(-2deg) translateY(5px) translateX(-3px);
      opacity: 0.75;
    }

    .og-bill--front {
      transform: rotate(1deg);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .og-bill-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .og-bill-circle {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 2px solid #C4A265;
      background: rgba(196,162,101,0.15);
    }

    .og-bill-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 8px;
      letter-spacing: 2px;
      color: rgba(100,80,40,0.5);
      text-transform: uppercase;
    }

    .og-bill-corner {
      position: absolute;
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 700;
      color: rgba(100,80,40,0.4);
    }
    .og-bill-corner--tl { top: 8px; left: 10px; }
    .og-bill-corner--br { bottom: 8px; right: 10px; }
  </style>
</head>
<body>
  <div class="og">
    <div class="og-left">
      <div class="og-eyebrow">TAP · VEND · CELEBRATE</div>
      <h1 class="og-headline">
        The celebration station<br>
        your guests won't forget.
      </h1>
      <div class="og-trust">Starting at $200 · GTA Events · Fully Insured</div>
      <div class="og-url">mycashstation.ca</div>
    </div>
    <div class="og-right">
      <div class="og-card">
        <div class="og-bills">
          <div class="og-bill og-bill--back"></div>
          <div class="og-bill og-bill--mid"></div>
          <div class="og-bill og-bill--front">
            <div class="og-bill-inner">
              <div class="og-bill-circle"></div>
              <div class="og-bill-text">Your Faces Here</div>
            </div>
            <span class="og-bill-corner og-bill-corner--tl">$</span>
            <span class="og-bill-corner og-bill-corner--br">$</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
