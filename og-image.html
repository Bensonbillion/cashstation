<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #0A0A0A;
    font-family: 'DM Sans', sans-serif;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,215,0,0.06) 0%, transparent 70%);
    bottom: -200px;
    left: -100px;
    pointer-events: none;
  }
  .content {
    position: absolute;
    left: 80px;
    top: 50%;
    transform: translateY(-50%);
    max-width: 620px;
  }
  .eyebrow {
    font-size: 14px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: #C4A265;
    margin-bottom: 24px;
    display: block;
  }
  h1 {
    font-size: 68px;
    font-weight: 900;
    line-height: 1.08;
    color: #F0EDE6;
    margin-bottom: 28px;
    font-family: Georgia, serif;
  }
  h1 span { color: #FFD700; }
  .trust {
    font-size: 18px;
    color: #666;
    margin-bottom: 36px;
    letter-spacing: 0.02em;
  }
  .url {
    font-size: 16px;
    font-weight: 600;
    color: #FFD700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .visual {
    position: absolute;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
  }
  .machine-card {
    width: 280px;
    height: 360px;
    background: #fff;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 0 1px rgba(255,215,0,0.3), 0 40px 80px rgba(0,0,0,0.8);
    flex-direction: column;
    gap: 16px;
  }
  .bill-stack {
    position: relative;
    width: 180px;
    height: 200px;
  }
  .bill {
    position: absolute;
    width: 170px;
    height: 76px;
    background: linear-gradient(135deg, #E8E8C0, #D4D4A0);
    border: 2px solid rgba(45,80,22,0.3);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: rgba(30,60,10,0.5);
    letter-spacing: 0.15em;
    font-weight: 600;
  }
  .bill-1 { top: 0; left: 10px; transform: rotate(-8deg); opacity: 0.6; }
  .bill-2 { top: 40px; left: 5px; transform: rotate(-3deg); opacity: 0.8; }
  .bill-3 { top: 80px; left: 0; transform: rotate(0deg); z-index: 3; }
  .card-label {
    font-size: 11px;
    color: #888;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .gold-line {
    position: absolute;
    bottom: 80px;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,215,0,0.25), transparent);
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="glow"></div>
<div class="content">
  <span class="eyebrow">TAP · VEND · CELEBRATE</span>
  <h1>The <span>celebration</span><br>station your<br>guests won't forget.</h1>
  <p class="trust">Starting at $200 · GTA Events · Fully Insured</p>
  <span class="url">mycashstation.ca</span>
</div>
<div class="visual">
  <div class="machine-card">
    <div class="bill-stack">
      <div class="bill bill-1">NOVELTY</div>
      <div class="bill bill-2">NOVELTY</div>
      <div class="bill bill-3">YOUR FACES HERE</div>
    </div>
    <span class="card-label">MyCashStation</span>
  </div>
</div>
<div class="gold-line"></div>
</body>
</html>
